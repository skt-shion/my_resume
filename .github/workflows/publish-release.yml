name: publish-release

on:
  push:
    tags: ["*"]
  workflow_dispatch:

jobs:
  release:
    name: "publish release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fontconfig fonts-noto-cjk fonts-ipafont-gothic
      - name: Verify Japanese fonts
        run: |
          fc-list | grep -E "Noto Sans CJK JP|IPAexGothic|IPAGothic" || {
            echo "Japanese font is not available on runner";
            exit 1;
          }
      - run: npm ci
      - name: Clear Puppeteer cache
        run: rm -rf ~/.cache/puppeteer /home/runner/.cache/puppeteer
      - name: Install Chromium
        run: |
          npx puppeteer browsers install chrome
          BROWSER_PATH=$(find /home/runner/.cache/puppeteer -name "chrome-linux64" -type d | head -1)
          if [ -n "$BROWSER_PATH" ]; then
            echo "PUPPETEER_EXECUTABLE_PATH=${BROWSER_PATH}/chrome" >> $GITHUB_ENV
          fi
      - name: Generate PDF
        run: npm run pdf
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ github.event.pull_request.title }}
          draft: true
          fail_on_unmatched_files: true
          files: docs/README.pdf
          name: Release ${{ github.ref }}
