name: publish-release

on:
  push:
    tags: ["*"]
  workflow_dispatch:

jobs:
  release:
    name: "publish release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fontconfig fonts-noto-cjk fonts-ipafont-gothic texlive-xetex texlive-lang-cjk texlive-latex-recommended lmodern pandoc
      - name: Verify Japanese fonts
        run: |
          fc-list | grep -E "Noto Sans CJK JP|IPAexGothic|IPAGothic" || {
            echo "Japanese font is not available on runner";
            exit 1;
          }
      - run: npm ci
      - name: Generate PDF
        run: npm run pdf
      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ github.event.pull_request.title }}
          draft: true
          fail_on_unmatched_files: true
          files: docs/README.pdf
          name: Release ${{ github.ref }}
