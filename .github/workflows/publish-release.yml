name: publish-release

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  release:
    name: 'publish release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libnss3 libasound2-dev
      - run: npm install
      - name: Generate PDF
        run: npm run topdf
      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ github.event.pull_request.title }}
          draft: true
          fail_on_unmatched_files: true
          files: docs/README.pdf
          name: Release ${{ github.ref }}
